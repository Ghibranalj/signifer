services:
  signifer:
    container_name: registry.mrjaringan.com/public/signifer:latest
    restart: unless-stopped
    ports:
      - "80:9090"  # Host port 80 -> Container port 9090
    volumes:
      # Mount config.yaml from host
      - ./config.yaml:/config.yaml:ro
      # Persist SQLite database
      - ./data:/data
    cap_add:
      - CAP_NET_RAW  # Required for ICMP pinging
