version: "2"
sql:
  - engine: "sqlite"
    schema: "./db/migrations/"
    queries: "./db/queries.sql"
    gen:
      go:
        emit_json_tags: true
        package: "sqlc"
        out: "./db/sqlc"
        overrides:
          - column: "devices.id"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "text"
            nullable: true
            go_type:
              import: "github.com/guregu/null/v6"
              type: "String"
